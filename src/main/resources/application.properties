# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# JWT Configuration - MUST be set via environment variable in production
jwt.secret=${JWT_SECRET:rxIncredibleSecretKeyForDevelopment123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${SERVER_PORT:8081}
server.address=${SERVER_ADDRESS:0.0.0.0}

# MySQL Database Configuration - MUST use environment variables in production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rxincredible?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration - Disable show-sql in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging - Production settings
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.com.rxincredible.service.EmailService=DEBUG
logging.level.com.rxincredible.service.OrderService=INFO
logging.level.org.springframework.mail=DEBUG
logging.file.name=backend.log

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Document Upload Folder
app.upload.directory=${APP_UPLOAD_DIRECTORY:D:\\RxIncredible\\rxincredible-backend\\uploads\\documents}

# Static Resource Configuration
spring.web.resources.static-locations=file:${app.upload.directory}/

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Email Configuration - MUST use environment variables in production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:mramteke80@gmail.com}
spring.mail.password=${MAIL_PASSWORD:lypnjzknzjtuoass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:30000}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:30000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:30000}
spring.mail.default-encoding=UTF-8

# Frontend Base URL for payment and rejection links
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5180}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://rxincredible.com,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5180,http://localhost:5181,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5176,http://127.0.0.1:5180,http://127.0.0.1:5181,http://127.0.0.1:3000}

# Default users initialization (set to false in production)
